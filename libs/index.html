<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        let render_error = false;
        // 绑定control-v事件
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'v') {
                window.get_ctrl_v()
            } else if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c') {
                if (render_error) {
                    e.preventDefault();
                    return;
                }
                window.get_ctrl_shift_c()
            } else if (e.ctrlKey && e.key.toLowerCase() === 'c') {
                if (render_error) {
                    e.preventDefault();
                    return;
                }
                window.get_ctrl_c()
            }
        });
    </script>
    <link rel="stylesheet" href="./katex/katex.min.css">
    <script type="text/javascript" src="./katex/katex.min.js"></script>
    <script type="text/javascript" src="./katex/contrib/auto-render.min.js"></script>
    <script>
        function render(latex) {
            const container = document.getElementsByClassName('math-container')[0];
            container.textContent = latex;
            try {
                renderMathInElement(document.body, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: true
                });
                render_error = false;
                window.render_ok();
            } catch (err) {
                render_error = true;
                container.textContent = '渲染失败：' + (err && err.message ? err.message : '未知错误');
                window.render_error();
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            position: absolute;
            background-color: white;
            overflow: auto;
        }
        .math-container {
            height: 100%;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="math-container">
        数学公式将在此显示。将图片粘贴到此应用进行识别。
    </div>
</body>
</html>
